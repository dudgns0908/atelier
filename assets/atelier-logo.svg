<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1034 270" role="img" aria-labelledby="title desc">
  <title id="title">atelier logo</title>
  <desc id="desc">A slash-command wordmark for atelier with a segmented slash representing parallel review lanes.</desc>
  <style>
    .word { fill: #27323A; }
    @media (prefers-color-scheme: dark) {
